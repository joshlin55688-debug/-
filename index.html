<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純技術分析儀表板 | API 即時抓取版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #444; flex: 1; background: #2a2a2a; color: white; }
        button { padding: 10px 20px; font-size: 16px; border-radius: 5px; border: none; background-color: #007bff; color: white; cursor: pointer; transition: 0.3s; font-weight: bold;}
        button:hover { background-color: #0056b3; }
        #chart { width: 100%; height: 500px; background: #1e1e1e; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .analysis-panel { background: #1e1e1e; padding: 25px; border-radius: 8px; line-height: 1.8; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .signal-buy { color: #26a69a; font-weight: bold; }
        .signal-sell { color: #ef5350; font-weight: bold; }
        .signal-neutral { color: #ffb74d; font-weight: bold; }
        h2, h3 { margin-top: 0; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>📈 技術分析儀表板 (即時 API 版)</h2>
    <div class="search-bar">
        <input type="text" id="symbol" placeholder="輸入代號 (美股: TSLA, 台股上市: 2330.TW, 台股上櫃: 3105.TWO)" value="NVDA" oninput="this.value = this.value.toUpperCase()">
        <button onclick="analyzeStock()" id="search-btn">搜尋並分析</button>
    </div>
    
    <div id="chart"></div>

    <div class="analysis-panel">
        <h3>📊 演算法分析結論 <span id="trend-status"></span></h3>
        <ul id="ta-results">
            <li>請輸入股票代號並點擊搜尋，系統將即時抓取最新數據...</li>
        </ul>
        <h4 id="final-verdict" style="font-size: 1.2em; border-top: 1px solid #444; padding-top: 15px; margin-top: 15px;"></h4>
    </div>
</div>

<script>
    // 初始化 TradingView 輕量級圖表
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout: { backgroundColor: '#1e1e1e', textColor: '#d1d4dc', },
        grid: { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: '#2b2b43' },
        timeScale: { borderColor: '#2b2b43' },
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
        wickUpColor: '#26a69a', wickDownColor: '#ef5350'
    });

    // === 核心修改：前端即時抓取 Yahoo Finance API ===
    async function fetchRealData(symbol) {
        try {
            // Yahoo Finance API (抓取過去 1 年的日K線)
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1y&interval=1d`;
            
            // 使用 corsproxy.io 繞過瀏覽器跨網域限制 (CORS)
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

            const response = await fetch(proxyUrl);
            
            if (!response.ok) {
                throw new Error("網路請求失敗，請稍後再試");
            }
            
            const rawData = await response.json();

            // 防呆：確認回傳資料是否包含該股票
            if (!rawData.chart.result || rawData.chart.result.length === 0) {
                throw new Error("找不到該股票，請確認代號是否正確");
            }

            const result = rawData.chart.result[0];
            const timestamps = result.timestamp;
            const quote = result.indicators.quote[0];

            let chartData = [];
            
            // 將 Yahoo 的資料格式轉換為圖表所需的 { time, open, high, low, close }
            for (let i = 0; i < timestamps.length; i++) {
                // 排除沒有交易的空白資料 (如假日)
                if (quote.close[i] !== null && quote.open[i] !== null) {
                    // Unix 時間戳轉換為 YYYY-MM-DD
                    const date = new Date(timestamps[i] * 1000);
                    const timeString = date.toISOString().split('T')[0];
                    
                    chartData.push({
                        time: timeString,
                        open: Number(quote.open[i].toFixed(2)),
                        high: Number(quote.high[i].toFixed(2)),
                        low: Number(quote.low[i].toFixed(2)),
                        close: Number(quote.close[i].toFixed(2))
                    });
                }
            }
            return chartData;

        } catch (error) {
            console.error(error);
            alert(`抓取 ${symbol} 失敗！\n1. 請確認代號正確 (台股上市加 .TW，上櫃加 .TWO)\n2. 可能是免費代理伺服器忙碌，請過幾秒再試一次。\n詳細錯誤: ${error.message}`);
            return [];
        }
    }

    // === 自製原生技術指標計算引擎 ===
    function calculateSMA(data, period) {
        if (data.length < period) return null;
        let sum = 0;
        for (let i = data.length - period; i < data.length; i++) { sum += data[i]; }
        return sum / period;
    }

    function calculateRSI(data, period) {
        if (data.length <= period) return null;
        let gains = 0, losses = 0;
        for (let i = 1; i <= period; i++) {
            let change = data[i] - data[i - 1];
            if (change > 0) gains += change;
            else losses -= change;
        }
        let avgGain = gains / period;
        let avgLoss = losses / period;

        for (let i = period + 1; i < data.length; i++) {
            let change = data[i] - data[i - 1];
            let currentGain = change > 0 ? change : 0;
            let currentLoss = change < 0 ? Math.abs(change) : 0;
            avgGain = ((avgGain * (period - 1)) + currentGain) / period;
            avgLoss = ((avgLoss * (period - 1)) + currentLoss) / period;
        }
        if (avgLoss === 0) return 100;
        let rs = avgGain / avgLoss;
        return 100 - (100 / (1 + rs));
    }

    function calculateEMA(data, period) {
        if (data.length < period) return null;
        let k = 2 / (period + 1);
        let sum = 0;
        for(let i = 0; i < period; i++) { sum += data[i]; }
        let ema = sum / period; 
        for (let i = period; i < data.length; i++) {
            ema = (data[i] * k) + (ema * (1 - k));
        }
        return ema;
    }

    function calculateMACD(data) {
        if (data.length < 26) return null;
        let ema12 = calculateEMA(data, 12); 
        let ema26 = calculateEMA(data, 26);
        return ema12 - ema26; 
    }

    // === 主程式 ===
    async function analyzeStock() {
        const symbolInput = document.getElementById('symbol');
        const symbol = symbolInput.value.toUpperCase().trim();
        const btn = document.getElementById('search-btn');
        const resultsContainer = document.getElementById('ta-results');
        const verdictContainer = document.getElementById('final-verdict');
        
        if (!symbol) return;

        // UI 狀態更新
        btn.innerText = "資料抓取中...";
        btn.disabled = true;
        resultsContainer.innerHTML = "<li>正在從 Yahoo Finance 獲取即時資料...</li>";
        verdictContainer.innerHTML = "";
        
        // 1. 獲取資料並畫圖
        const historicalData = await fetchRealData(symbol);
        
        if (!historicalData || historicalData.length === 0) {
            resultsContainer.innerHTML = `<li><span class="signal-sell">無法載入數據，請檢查代號是否正確。</span></li>`;
            btn.innerText = "搜尋並分析";
            btn.disabled = false;
            return;
        }

        candleSeries.setData(historicalData);
        chart.timeScale().fitContent(); // 自動縮放圖表符合畫面

        // 2. 準備收盤價陣列與計算指標
        const closes = historicalData.map(d => d.close);
        const currentClose = closes[closes.length - 1];
        const currentSMA = calculateSMA(closes, 20);
        const currentRSI = calculateRSI(closes, 14);
        const currentMACD = calculateMACD(closes);

        // 3. 純技術分析邏輯判斷
        let score = 0;
        let resultsHTML = `<li><strong>當前最新收盤價：</strong> $${currentClose.toFixed(2)}</li>`;

        // RSI 判斷
        if (currentRSI !== null) {
            if(currentRSI > 70) { 
                resultsHTML += `<li><span class="signal-sell">RSI (${currentRSI.toFixed(2)}) 進入超買區</span>：短期動能過熱，面臨回檔風險。</li>`; 
                score -= 1; 
            } else if(currentRSI < 30) { 
                resultsHTML += `<li><span class="signal-buy">RSI (${currentRSI.toFixed(2)}) 進入超賣區</span>：短線乖離過大，醞釀跌深反彈。</li>`; 
                score += 1; 
            } else { 
                resultsHTML += `<li><span class="signal-neutral">RSI (${currentRSI.toFixed(2)}) 中性區間</span>：動能平穩，無極端超買賣現象。</li>`; 
            }
        }

        // 均線判斷
        if (currentSMA !== null) {
            if(currentClose > currentSMA) { 
                resultsHTML += `<li><span class="signal-buy">站上 20 日均線 (${currentSMA.toFixed(2)})</span>：中期趨勢偏多，支撐強勁。</li>`; 
                score += 1; 
            } else { 
                resultsHTML += `<li><span class="signal-sell">跌破 20 日均線 (${currentSMA.toFixed(2)})</span>：中期趨勢偏空，上方壓力大。</li>`; 
                score -= 1; 
            }
        }

        // MACD 判斷
        if (currentMACD !== null) {
            if(currentMACD > 0) { 
                resultsHTML += `<li><span class="signal-buy">MACD 柱狀圖大於 0</span>：多方力道相對增強，趨勢向上。</li>`; 
                score += 1; 
            } else { 
                resultsHTML += `<li><span class="signal-sell">MACD 柱狀圖小於 0</span>：空方力道主導，趨勢向下。</li>`; 
                score -= 1; 
            }
        }

        // 4. 輸出綜合結論
        resultsContainer.innerHTML = resultsHTML;
        
        if(score >= 2) { 
            verdictContainer.innerHTML = `🏆 綜合判定：<span class="signal-buy">強勢偏多 (Buy)</span><br><span style="font-size:0.85em; color:#aaa; font-weight:normal;">技術面共識度高，符合動能做多策略，建議偏多操作。</span>`; 
        } else if (score <= -2) { 
            verdictContainer.innerHTML = `⚠️ 綜合判定：<span class="signal-sell">弱勢偏空 (Sell)</span><br><span style="font-size:0.85em; color:#aaa; font-weight:normal;">技術面轉弱，建議空手觀望或執行停損/偏空策略。</span>`; 
        } else { 
            verdictContainer.innerHTML = `⚖️ 綜合判定：<span class="signal-neutral">趨勢震盪 (Hold)</span><br><span style="font-size:0.85em; color:#aaa; font-weight:normal;">多空訊號分歧，缺乏明確單邊方向，建議縮小部位或等待突破。</span>`; 
        }

        // 恢復按鈕狀態
        btn.innerText = "搜尋並分析";
        btn.disabled = false;
    }
    
    // 網頁載入時自動執行一次分析 (預設 NVDA)
    window.onload = () => analyzeStock();
    
    // 支援按下 Enter 鍵搜尋
    document.getElementById('symbol').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') analyzeStock();
    });
</script>
</body>
</html>
