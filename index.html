<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能技術分析儀表板</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }

        .header-panel { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; justify-content: space-between; align-items: center; background: #1e222d; padding: 15px; border-radius: 8px; }
        .search-bar { display: flex; gap: 10px; flex: 1; min-width: 280px; }
        .api-bar { display: flex; gap: 10px; align-items: center; font-size: 0.9em; color: #aaa; flex-wrap: wrap; }

        input { padding: 10px 12px; font-size: 15px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #2962ff; }
        .search-bar input { flex: 1; }
        button { padding: 10px 22px; font-size: 15px; border-radius: 5px; border: none; cursor: pointer; transition: background 0.2s, opacity 0.2s; font-weight: bold; }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        .btn-primary { background: #2962ff; color: white; }
        .btn-primary:hover:not(:disabled) { background: #1e4bd8; }
        .btn-ai { background: #9c27b0; color: white; }
        .btn-ai:hover:not(:disabled) { background: #7b1fa2; }

        .chart-container { background: #1e222d; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #main-chart  { width: 100%; height: 500px; margin-bottom: 10px; }
        #macd-chart  { width: 100%; height: 250px; }

        /* 擴充為三欄式排版 */
        .analysis-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 1024px) { .analysis-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .analysis-grid { grid-template-columns: 1fr; } }
        
        .panel { background: #1e222d; padding: 25px; border-radius: 8px; line-height: 1.8; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 500px; overflow-y: auto; }

        .signal-buy    { color: #26a69a; font-weight: bold; }
        .signal-sell   { color: #ef5350; font-weight: bold; }
        .signal-neutral{ color: #ffb74d; font-weight: bold; }
        h2, h3 { margin-top: 0; color: #fff; }

        /* 目標價進度條樣式 */
        .target-scale { display: flex; justify-content: space-between; font-size: 0.85em; color: #aaa; margin-top: 15px; }
        .target-bar-bg { background: #444; height: 8px; border-radius: 4px; margin: 5px 0 20px 0; position: relative; }
        .current-price-dot { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: -2px; box-shadow: 0 0 8px rgba(255,255,255,0.8); transform: translateX(-50%); transition: left 0.5s; }
        .mean-price-marker { position: absolute; width: 4px; height: 16px; background: #26a69a; top: -4px; transform: translateX(-50%); }

        #ai-content { font-size: 0.95em; color: #ccc; padding-right: 10px; }
        #ai-content h1, #ai-content h2, #ai-content h3 { color: #e1bee7; margin-top: 15px; margin-bottom: 5px; font-size: 1.1em; }
        #ai-content p { margin-top: 0; }
        .api-link { color: #2962ff; text-decoration: none; }
        .api-link:hover { text-decoration: underline; }

        ::-webkit-scrollbar        { width: 8px; }
        ::-webkit-scrollbar-track  { background: #1e222d; }
        ::-webkit-scrollbar-thumb  { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-panel">
        <div>
            <h2 style="margin-bottom:8px;">🤖 AI 智能整合看盤系統</h2>
            <div class="search-bar">
                <input type="text" id="symbol" placeholder="輸入代號 (如 NVDA, 2330.TW)" value="NVDA"
                       oninput="this.value = this.value.toUpperCase()">
                <button class="btn-primary" id="search-btn" onclick="analyzeStock()">抓取大數據</button>
            </div>
        </div>
        <div class="api-bar">
            <span>🔑 Gemini 金鑰：</span>
            <input type="password" id="gemini-key" placeholder="貼上你的 API Key" style="width:240px; padding:8px;">
            <button class="btn-primary" style="padding:8px 14px; font-size:13px;" onclick="saveApiKey()">儲存</button>
            <a href="https://aistudio.google.com/app/apikey" target="_blank" class="api-link">免費獲取</a>
        </div>
    </div>

    <div class="chart-container">
        <div id="main-chart"></div>
        <div id="macd-chart"></div>
    </div>

    <div class="analysis-grid">
        <div class="panel">
            <h3 style="border-bottom: 1px solid #444; padding-bottom: 10px;">🎯 機構評等與目標價</h3>
            <div id="analyst-content">請輸入股票代號並點擊搜尋...</div>
        </div>

        <div class="panel">
            <h3 style="border-bottom: 1px solid #444; padding-bottom: 10px;">📊 演算法技術分析</h3>
            <ul id="ta-results"><li>請輸入股票代號並點擊搜尋...</li></ul>
            <h4 id="final-verdict" style="font-size:1.2em; border-top:1px solid #444; padding-top:15px; margin-top:15px;"></h4>
        </div>

        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:15px;">
                <h3 style="margin:0;">✨ Gemini 深度洞察</h3>
                <button class="btn-ai" id="ai-btn" style="padding: 6px 12px; font-size: 14px;" onclick="generateAIAnalysis()">結合數據生成</button>
            </div>
            <div id="ai-content">請先完成數據抓取，再點擊「結合數據生成」，AI 將綜合機構預測與當前股價給出分析。</div>
        </div>
    </div>
</div>

<script>
// ── 常數與全域變數 ────────────────────────────────────────────────────────
const CORS_PROXIES = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://thingproxy.freeboard.io/fetch/${url}`,
];
const BB_PERIOD   = 20;
const RSI_PERIOD  = 14;
const MACD_FAST   = 12;
const MACD_SLOW   = 26;
const MACD_SIGNAL = 9;

// 儲存最新的股價與機構預測，供 AI 寫報告時取用
let globalCurrentPrice = 0;
let globalTargetData = null;

// ── API Key ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('geminiApiKey');
    if (saved) document.getElementById('gemini-key').value = saved;
    analyzeStock();
});

function saveApiKey() {
    const key = document.getElementById('gemini-key').value.trim();
    if (key) { localStorage.setItem('geminiApiKey', key); alert('已儲存！'); }
    else      { localStorage.removeItem('geminiApiKey'); alert('已清除！'); }
}

// ── 圖表初始化 ─────────────────────────────────────────────────────────────
const baseLayout = {
    layout:     { backgroundColor: '#1e222d', textColor: '#d1d4dc' },
    grid:       { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
    crosshair:  { mode: LightweightCharts.CrosshairMode.Normal },
    timeScale:  { borderColor: '#2b2b43', timeVisible: true },
};

const mainChart = LightweightCharts.createChart(
    document.getElementById('main-chart'),
    { ...baseLayout, rightPriceScale: { borderColor: '#2b2b43' } }
);
const candleSeries = mainChart.addCandlestickSeries({
    upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350',
});
const volumeSeries = mainChart.addHistogramSeries({
    color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: 'vol',
});
mainChart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

const bbUpperSeries  = mainChart.addLineSeries({ color: 'rgba(41,98,255,0.5)',  lineWidth: 1, title: 'BB Upper' });
const bbMiddleSeries = mainChart.addLineSeries({ color: 'rgba(255,152,0,0.8)',  lineWidth: 2, title: 'SMA 20'   });
const bbLowerSeries  = mainChart.addLineSeries({ color: 'rgba(41,98,255,0.5)',  lineWidth: 1, title: 'BB Lower' });

const macdChart = LightweightCharts.createChart(
    document.getElementById('macd-chart'),
    { ...baseLayout, rightPriceScale: { visible: true, borderColor: '#2b2b43' }, leftPriceScale:  { visible: true, borderColor: '#2b2b43' } }
);
const macdHistSeries   = macdChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'right' });
const macdLineSeries   = macdChart.addLineSeries({ color: '#2962FF', lineWidth: 2, title: 'MACD',       priceScaleId: 'right' });
const macdSignalSeries = macdChart.addLineSeries({ color: '#FF6D00', lineWidth: 2, title: 'Signal',     priceScaleId: 'right' });
const rsiSeries        = macdChart.addLineSeries({ color: '#E1BEE7', lineWidth: 1.5, title: 'RSI (14)', priceScaleId: 'left'  });

rsiSeries.createPriceLine({ price: 70, color: '#ef5350', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: '超買' });
rsiSeries.createPriceLine({ price: 30, color: '#26a69a', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: '超賣' });

let syncing = false;
mainChart.timeScale().subscribeVisibleTimeRangeChange(r => { if (syncing || !r) return; syncing = true; macdChart.timeScale().setVisibleRange(r); syncing = false; });
macdChart.timeScale().subscribeVisibleTimeRangeChange(r => { if (syncing || !r) return; syncing = true; mainChart.timeScale().setVisibleRange(r); syncing = false; });

// ── 資料清洗與抓取 ──────────────────────────────────────────────────────────
function safeLineData(arr) { return arr.filter(d => d?.time && Number.isFinite(d.value)).sort((a, b) => a.time < b.time ? -1 : 1); }
function safeCandleData(arr) { return arr.filter(d => d?.time && [d.open, d.high, d.low, d.close].every(Number.isFinite)).sort((a, b) => a.time < b.time ? -1 : 1); }

async function fetchFromYahoo(url) {
    let raw = null;
    for (const makeUrl of CORS_PROXIES) {
        try {
            const res = await fetch(makeUrl(url));
            if (res.ok) { raw = await res.json(); break; }
        } catch { /* try next */ }
    }
    if (!raw) throw new Error('API 伺服器忙線中');
    return raw;
}

async function fetchRealData(symbol) {
    const raw = await fetchFromYahoo(`https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?range=3y&interval=1d`);
    if (!raw?.chart?.result) throw new Error('查無K線歷史資料');
    const { timestamp = [], indicators: { quote: [q = {}] } } = raw.chart.result[0];
    const seen = new Set();
    const data = [];
    for (let i = 0; i < timestamp.length; i++) {
        if (q.open[i] == null || q.close[i] == null || q.high[i] == null || q.low[i] == null) continue;
        const time = new Date(timestamp[i] * 1000).toISOString().slice(0, 10);
        if (seen.has(time)) continue;
        seen.add(time);
        data.push({ time, open: +q.open[i].toFixed(2), high: +q.high[i].toFixed(2), low: +q.low[i].toFixed(2), close: +q.close[i].toFixed(2), volume: q.volume[i] || 0 });
    }
    return safeCandleData(data);
}

// 新增：抓取機構目標價資料
async function fetchAnalystData(symbol) {
    try {
        const raw = await fetchFromYahoo(`https://query2.finance.yahoo.com/v10/finance/quoteSummary/${symbol}?modules=financialData`);
        return raw.quoteSummary.result[0].financialData;
    } catch (e) {
        return null; // 若無資料（如部分台股），回傳 null 而非中斷程式
    }
}

// ── 指標計算 ───────────────────────────────────────────────────────────────
function calcSMA(data, period) {
    const result = []; let sum = 0;
    for (let i = 0; i < data.length; i++) {
        sum += data[i].close; if (i >= period) sum -= data[i - period].close;
        if (i >= period - 1) result.push({ time: data[i].time, value: sum / period });
    }
    return result;
}
function calcBBands(data, sma, period) {
    const upper = [], lower = [];
    sma.forEach((s, j) => {
        const base = j + period - 1; let sumSq = 0;
        for (let k = 0; k < period; k++) sumSq += (data[base - k].close - s.value) ** 2;
        const std = Math.sqrt(sumSq / period);
        upper.push({ time: s.time, value: s.value + std * 2 }); lower.push({ time: s.time, value: s.value - std * 2 });
    });
    return { upper, lower };
}
function calcEMA(data, period, closeKey = 'close') {
    const result = []; if (data.length < period) return result;
    const k = 2 / (period + 1); let ema = data.slice(0, period).reduce((s, d) => s + d[closeKey], 0) / period;
    result.push({ time: data[period - 1].time, value: ema });
    for (let i = period; i < data.length; i++) { ema = data[i][closeKey] * k + ema * (1 - k); result.push({ time: data[i].time, value: ema }); }
    return result;
}
function calcRSI(data, period) {
    const result = []; if (data.length <= period) return result;
    let avgGain = 0, avgLoss = 0;
    for (let i = 1; i <= period; i++) {
        const d = data[i].close - data[i - 1].close;
        if (d > 0) avgGain += d; else avgLoss -= d;
    }
    avgGain /= period; avgLoss /= period;
    const rsi = v => v === 0 ? 100 : 100 - 100 / (1 + v);
    result.push({ time: data[period].time, value: rsi(avgLoss === 0 ? Infinity : avgGain / avgLoss) });
    for (let i = period + 1; i < data.length; i++) {
        const d = data[i].close - data[i - 1].close;
        avgGain = (avgGain * (period - 1) + Math.max(d, 0)) / period; avgLoss = (avgLoss * (period - 1) + Math.max(-d, 0)) / period;
        result.push({ time: data[i].time, value: rsi(avgLoss === 0 ? Infinity : avgGain / avgLoss) });
    }
    return result;
}
function calcMACD(data) {
    const ema12 = calcEMA(data, MACD_FAST); const ema26 = calcEMA(data, MACD_SLOW);
    const map12 = new Map(ema12.map(e => [e.time, e.value]));
    const macdRaw = ema26.filter(e => map12.has(e.time)).map(e => ({ time: e.time, close: map12.get(e.time) - e.value }));
    const signal = calcEMA(macdRaw, MACD_SIGNAL, 'close');
    const lineData = [], sigData = [], histData = []; let prevHist = 0;
    signal.forEach(s => {
        const m = macdRaw.find(r => r.time === s.time); if (!m) return;
        const hist = m.close - s.value;
        const color = hist >= 0 ? (hist >= prevHist ? '#26a69a' : '#80cbc4') : (hist <= prevHist ? '#ef5350'  : '#ef9a9a');
        lineData.push({ time: s.time, value: m.close }); sigData.push({ time: s.time, value: s.value }); histData.push({ time: s.time, value: hist, color });
        prevHist = hist;
    });
    return { lineData, sigData, histData };
}

// ── 主程式 (整合三面板資料) ─────────────────────────────────────────────────
async function analyzeStock() {
    const symbol = document.getElementById('symbol').value.toUpperCase().trim();
    if (!symbol) return;

    const btn = document.getElementById('search-btn');
    const resultsList = document.getElementById('ta-results');
    const verdict = document.getElementById('final-verdict');
    const analystDiv = document.getElementById('analyst-content');
    
    document.getElementById('ai-content').innerHTML = '資料更新完畢，請點擊上方「結合數據生成」獲取最新 AI 洞察報告。';

    btn.textContent = '資料抓取中...'; btn.disabled = true;
    resultsList.innerHTML = '<li>連線抓取並清洗資料中...</li>';
    analystDiv.innerHTML = '正在獲取各大機構共識數據...';
    verdict.innerHTML = '';

    try {
        // 同時非同步抓取「歷史 K 線」與「機構目標價」
        const [data, analystData] = await Promise.all([
            fetchRealData(symbol),
            fetchAnalystData(symbol)
        ]);
        
        if (data.length < 30) throw new Error('歷史資料量不足。');

        // 存入全域變數供 AI 使用
        globalCurrentPrice = data[data.length - 1].close;
        globalTargetData = analystData;

        // 【面板 1：渲染機構目標價】
        if (analystData && analystData.targetMeanPrice && analystData.targetMeanPrice.raw) {
            const mean = analystData.targetMeanPrice.raw;
            const low = analystData.targetLowPrice.raw;
            const high = analystData.targetHighPrice.raw;
            const curPrice = globalCurrentPrice;
            const ups = (((mean / curPrice) - 1) * 100).toFixed(2);
            const isOptimistic = ups > 0;

            // 計算圓點在進度條上的相對位置 (0% 到 100%)
            let range = high - low;
            let dotPos = 0;
            let meanPos = 50; // 預設中間
            if (range > 0) {
                dotPos = ((curPrice - low) / range) * 100;
                dotPos = Math.max(0, Math.min(100, dotPos)); // 鎖定在 0~100 內
                meanPos = ((mean - low) / range) * 100;
            }

            analystDiv.innerHTML = `
                <p style="font-size: 1.1em; margin-bottom: 5px;">機構平均目標價：<strong style="font-size: 1.3em; color: ${isOptimistic ? '#26a69a' : '#ef5350'}">$${mean}</strong></p>
                <p style="margin-top: 0; color: #aaa;">潛在空間：${isOptimistic ? '📈' : '📉'} <strong>${ups}%</strong></p>
                
                <div class="target-scale"><span>保守估值 $${low}</span><span>樂觀估值 $${high}</span></div>
                <div class="target-bar-bg">
                    <div class="mean-price-marker" style="left: ${meanPos}%;" title="平均目標價"></div>
                    <div class="current-price-dot" style="left: ${dotPos}%;" title="當前股價 $${curPrice}"></div>
                </div>
                <p style="font-size: 0.85em; color: #888; text-align: center;">⚪ 白點為當前股價，🟩 綠線為平均目標價</p>
                
                <div style="margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; font-size: 0.9em;">
                    <strong>投資評等建議：</strong><br>
                    ${analystData.recommendationKey ? analystData.recommendationKey.toUpperCase() : '無數據'} 
                    (基於 ${analystData.numberOfAnalystOpinions?.raw || 0} 位華爾街分析師)
                </div>
            `;
        } else {
            analystDiv.innerHTML = "<p style='color:#aaa; line-height: 1.6;'>⚠️ 暫無可用的機構目標價數據。<br>（註：Yahoo Finance 對於美股大型股的覆蓋率較佳，部分台股或冷門股可能無此資料）</p>";
        }

        // 【面板 2：渲染圖表與計算 TA】
        [candleSeries, volumeSeries, bbUpperSeries, bbMiddleSeries, bbLowerSeries, macdLineSeries, macdSignalSeries, macdHistSeries, rsiSeries].forEach(s => s.setData([]));

        candleSeries.setData(data);
        volumeSeries.setData(safeLineData(data.map(d => ({ time: d.time, value: d.volume, color: d.close >= d.open ? 'rgba(38,166,154,0.5)' : 'rgba(239,83,80,0.5)' }))));

        const sma20 = calcSMA(data, BB_PERIOD);
        const { upper, lower } = calcBBands(data, sma20, BB_PERIOD);
        bbMiddleSeries.setData(safeLineData(sma20)); bbUpperSeries.setData(safeLineData(upper)); bbLowerSeries.setData(safeLineData(lower));

        const { lineData, sigData, histData } = calcMACD(data);
        macdLineSeries.setData(safeLineData(lineData)); macdSignalSeries.setData(safeLineData(sigData)); macdHistSeries.setData(safeLineData(histData));

        const rsiData = calcRSI(data, RSI_PERIOD);
        rsiSeries.setData(safeLineData(rsiData));

        mainChart.timeScale().fitContent();

        // 技術分析文字總結
        const last = data[data.length - 1];
        const curRSI = rsiData.at(-1)?.value ?? 50;
        const curSMA20 = sma20.at(-1)?.value ?? last.close;
        const curUpper = upper.at(-1)?.value ?? last.close;
        const curLower = lower.at(-1)?.value ?? last.close;

        let score = 0;
        const items = [`<li><strong>當前收盤價：</strong> $${last.close.toFixed(2)}</li>`];

        if      (curRSI > 70) { items.push(`<li><span class="signal-sell">RSI (${curRSI.toFixed(1)}) 超買</span>：短期動能過熱。</li>`); score--; }
        else if (curRSI < 30) { items.push(`<li><span class="signal-buy">RSI (${curRSI.toFixed(1)}) 超賣</span>：短線醞釀反彈。</li>`); score++; }
        else                  { items.push(`<li><span class="signal-neutral">RSI (${curRSI.toFixed(1)}) 中性</span>：動能平穩。</li>`); }

        if      (last.close > curUpper) { items.push(`<li><span class="signal-sell">突破布林上軌</span>：股價強勢但乖離過大，注意拉回。</li>`); score--; }
        else if (last.close < curLower) { items.push(`<li><span class="signal-buy">跌破布林下軌</span>：可能出現超跌反彈。</li>`); score++; }
        else if (last.close > curSMA20) { items.push(`<li><span class="signal-buy">站上布林中軌 (20MA)</span>：多方控盤中。</li>`); score++; }
        else                            { items.push(`<li><span class="signal-sell">跌破布林中軌 (20MA)</span>：空方控盤中。</li>`); score--; }

        if (histData.length >= 2) {
            const h0 = histData.at(-1).value, h1 = histData.at(-2).value;
            if      (h0 > 0 && h0 > h1) { items.push(`<li><span class="signal-buy">MACD 紅柱伸長</span>：多方動能增強。</li>`); score++; }
            else if (h0 > 0 && h0 <= h1){ items.push(`<li><span class="signal-neutral">MACD 紅柱縮短</span>：多方動能衰退。</li>`); }
            else if (h0 < 0 && h0 < h1) { items.push(`<li><span class="signal-sell">MACD 綠柱伸長</span>：空方動能增強。</li>`); score--; }
            else if (h0 < 0 && h0 >= h1){ items.push(`<li><span class="signal-neutral">MACD 綠柱縮短</span>：空方動能減弱。</li>`); score++; }
        }

        resultsList.innerHTML = items.join('');
        if      (score >= 2)  verdict.innerHTML = `🏆 技術面判定：<span class="signal-buy">強勢偏多 (Buy)</span>`;
        else if (score <= -2) verdict.innerHTML = `⚠️ 技術面判定：<span class="signal-sell">弱勢偏空 (Sell)</span>`;
        else                  verdict.innerHTML = `⚖️ 技術面判定：<span class="signal-neutral">震盪整理 (Hold)</span>`;

    } catch (e) {
        resultsList.innerHTML = `<li><span class="signal-sell">錯誤：${e.message}</span></li>`;
        analystDiv.innerHTML = `⚠️ 無法取得機構數據`;
    } finally {
        btn.textContent = '抓取大數據'; btn.disabled = false;
    }
}

// ── 面板 3：結合數據與 AI 的深度分析 ───────────────────────────────────────────
async function generateAIAnalysis() {
    const symbol = document.getElementById('symbol').value.toUpperCase().trim();
    const apiKey = localStorage.getItem('geminiApiKey');
    const aiContent = document.getElementById('ai-content');
    const aiBtn = document.getElementById('ai-btn');

    if (!apiKey) { alert('請先在上方輸入並儲存 Gemini 金鑰！'); return; }
    if (globalCurrentPrice === 0) { alert('請先點擊「抓取大數據」獲得最新價格後再請求 AI 分析！'); return; }

    aiBtn.textContent = '思考中...'; aiBtn.disabled = true;
    aiContent.innerHTML = '正在綜合當前股價與機構預測進行分析，請稍候...';

    // 準備要餵給 AI 的背景資料
    let targetStr = "目前無華爾街機構目標價數據，請單純從企業基本面進行推估。";
    if (globalTargetData && globalTargetData.targetMeanPrice) {
        const mean = globalTargetData.targetMeanPrice.raw;
        const ups = (((mean / globalCurrentPrice) - 1) * 100).toFixed(2);
        targetStr = `華爾街機構平均目標價為 $${mean} (潛在漲/跌幅空間約 ${ups}%)。`;
    }

    const prompt = `你是一位頂尖的證券分析師。請用繁體中文，針對股票代號「${symbol}」進行深度洞察。
已知市場最新客觀數據：
- 當前股價為 $${globalCurrentPrice}
- ${targetStr}

請根據上述數據與你的知識庫，給出結構化的分析報告（字數控制在 400 字以內）：
1. **公司核心競爭力** (這家公司的護城河或主要賺錢業務是什麼？)
2. **估值與目標價探討** (結合上述我提供的股價與機構預期，判斷目前市場情緒是否過熱或被低估？)
3. **潛在風險提示** (未來一兩年可能面臨的最大阻礙是什麼？)`;

    try {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
            { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) }
        );
        if (!res.ok) throw new Error('API 請求失敗，請確認金鑰是否正確及額度。');
        
        const data = await res.json();
        aiContent.innerHTML = marked.parse(data.candidates[0].content.parts[0].text);
    } catch (e) {
        aiContent.innerHTML = `<span style="color:#ef5350;">AI 分析失敗：${e.message}</span>`;
    } finally {
        aiBtn.textContent = '結合數據生成'; aiBtn.disabled = false;
    }
}

document.getElementById('symbol').addEventListener('keydown', e => { if (e.key === 'Enter') analyzeStock(); });
</script>
