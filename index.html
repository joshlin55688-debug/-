<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純技術分析儀表板 | 台美股雙棲</title>
    
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; flex: 1; background: #2a2a2a; color: white; }
        button { padding: 10px 20px; font-size: 16px; border-radius: 5px; border: none; background-color: #007bff; color: white; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #chart { width: 100%; height: 500px; background: #1e1e1e; border-radius: 8px; margin-bottom: 20px; }
        .analysis-panel { background: #1e1e1e; padding: 20px; border-radius: 8px; }
        .signal-buy { color: #26a69a; font-weight: bold; }
        .signal-sell { color: #ef5350; font-weight: bold; }
        .signal-neutral { color: #ffb74d; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>純技術分析儀表板 (台美股)</h2>
    <div class="search-bar">
        <input type="text" id="symbol" placeholder="輸入代號 (美股: AAPL, 台股: 2330.TW)" value="AAPL">
        <button onclick="analyzeStock()">搜尋並分析</button>
    </div>
    
    <div id="chart"></div>

    <div class="analysis-panel">
        <h3>技術面分析結論 <span id="trend-status"></span></h3>
        <ul id="ta-results">
            <li>請點擊「搜尋並分析」載入數據...</li>
        </ul>
        <h4 id="final-verdict"></h4>
    </div>
</div>

<script>
    // 初始化 TradingView 輕量級圖表
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout: { backgroundColor: '#1e1e1e', textColor: '#d1d4dc', },
        grid: { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: '#2b2b43' },
        timeScale: { borderColor: '#2b2b43' },
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
        wickUpColor: '#26a69a', wickDownColor: '#ef5350'
    });

  // 讀取 GitHub Actions 抓回來的真實資料
    async function fetchRealData(symbol) {
        try {
            // 根據輸入的代號，去 data 資料夾找對應的 json 檔
            const response = await fetch(`data/${symbol}.json`);
            if (!response.ok) {
                throw new Error("找不到資料");
            }
            const data = await response.json();
            return data;
        } catch (error) {
            alert(`目前沒有 ${symbol} 的資料！請確認該股票是否在你 Python 腳本的 symbols 清單中。`);
            return [];
        }
    }

    // === 自製原生技術指標計算引擎 (絕對不會報錯) ===
    function calculateSMA(data, period) {
        if (data.length < period) return null;
        let sum = 0;
        for (let i = data.length - period; i < data.length; i++) {
            sum += data[i];
        }
        return sum / period;
    }

    function calculateRSI(data, period) {
        if (data.length <= period) return null;
        let gains = 0, losses = 0;
        for (let i = data.length - period; i < data.length; i++) {
            let change = data[i] - data[i - 1];
            if (change > 0) gains += change;
            else losses -= change;
        }
        if (losses === 0) return 100;
        let rs = (gains / period) / (losses / period);
        return 100 - (100 / (1 + rs));
    }

    function calculateEMA(data, period) {
        let k = 2 / (period + 1);
        let ema = data[0]; 
        for (let i = 1; i < data.length; i++) {
            ema = (data[i] * k) + (ema * (1 - k));
        }
        return ema;
    }

    function calculateMACD(data) {
        if (data.length < 26) return { histogram: null };
        let ema12 = calculateEMA(data.slice(-12), 12); 
        let ema26 = calculateEMA(data.slice(-26), 26);
        let macdLine = ema12 - ema26;
        return { histogram: macdLine }; 
    }
    // ==================================

    async function analyzeStock() {
        const symbol = document.getElementById('symbol').value.toUpperCase();
        document.getElementById('ta-results').innerHTML = "<li>資料載入與計算中...</li>";
        
        // 1. 獲取資料並畫圖
        const historicalData = await fetchRealData(symbol);
        candleSeries.setData(historicalData);

        // 2. 準備收盤價陣列
        const closes = historicalData.map(d => d.close);
        
        // 3. 取得最新一筆數據進行判定
        const currentClose = closes[closes.length - 1];
        const currentSMA = calculateSMA(closes, 20);
        const currentRSI = calculateRSI(closes, 14);
        const currentMACD = calculateMACD(closes);

        // 4. 純技術分析邏輯判斷
        let score = 0;
        let resultsHTML = "";

        // 動能判斷 (RSI)
        if (currentRSI !== null) {
            if(currentRSI > 70) { resultsHTML += `<li><span class="signal-sell">RSI (${currentRSI.toFixed(2)}) 進入超買區</span>，短期動能過熱，面臨回檔風險。</li>`; score -= 1; }
            else if(currentRSI < 30) { resultsHTML += `<li><span class="signal-buy">RSI (${currentRSI.toFixed(2)}) 進入超賣區</span>，短線乖離過大，醞釀跌深反彈。</li>`; score += 1; }
            else { resultsHTML += `<li><span class="signal-neutral">RSI (${currentRSI.toFixed(2)}) 處於中性區間</span>，動能平穩。</li>`; }
        }

        // 趨勢判斷 (均線)
        if (currentSMA !== null) {
            if(currentClose > currentSMA) { resultsHTML += `<li><span class="signal-buy">最新收盤價 (${currentClose.toFixed(2)}) 站上 20 日均線 (${currentSMA.toFixed(2)})</span>，中期趨勢偏多。</li>`; score += 1; }
            else { resultsHTML += `<li><span class="signal-sell">最新收盤價 (${currentClose.toFixed(2)}) 跌破 20 日均線 (${currentSMA.toFixed(2)})</span>，中期趨勢偏空。</li>`; score -= 1; }
        }

        // 買賣力道判斷 (MACD)
        if (currentMACD && currentMACD.histogram !== null) {
            if(currentMACD.histogram > 0) { resultsHTML += `<li><span class="signal-buy">MACD 短期趨勢向上</span>，多方力道相對增強。</li>`; score += 1; }
            else { resultsHTML += `<li><span class="signal-sell">MACD 短期趨勢向下</span>，空方力道主導。</li>`; score -= 1; }
        }

        // 5. 輸出綜合結論
        document.getElementById('ta-results').innerHTML = resultsHTML;
        let verdict = document.getElementById('final-verdict');
        if(score >= 2) { verdict.innerHTML = `綜合判定：<span class="signal-buy">強勢偏多 (Buy)</span>，符合動能做多策略。`; }
        else if (score <= -2) { verdict.innerHTML = `綜合判定：<span class="signal-sell">弱勢偏空 (Sell)</span>，建議觀望或偏空操作。`; }
        else { verdict.innerHTML = `綜合判定：<span class="signal-neutral">趨勢震盪 (Hold)</span>，缺乏明確方向，宜縮小部位。`; }
    }
</script>
</body>
</html>
