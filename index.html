<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能技術分析儀表板</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }

        .header-panel { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; justify-content: space-between; align-items: center; background: #1e222d; padding: 15px; border-radius: 8px; }
        .search-bar { display: flex; gap: 10px; flex: 1; min-width: 280px; }
        .api-bar { display: flex; gap: 10px; align-items: center; font-size: 0.9em; color: #aaa; flex-wrap: wrap; }

        input { padding: 10px 12px; font-size: 15px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #2962ff; }
        .search-bar input { flex: 1; }
        button { padding: 10px 22px; font-size: 15px; border-radius: 5px; border: none; cursor: pointer; transition: background 0.2s, opacity 0.2s; font-weight: bold; }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        .btn-primary { background: #2962ff; color: white; }
        .btn-primary:hover:not(:disabled) { background: #1e4bd8; }
        .btn-ai { background: #9c27b0; color: white; }
        .btn-ai:hover:not(:disabled) { background: #7b1fa2; }

        .chart-container { background: #1e222d; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #main-chart  { width: 100%; height: 500px; margin-bottom: 10px; }
        #macd-chart  { width: 100%; height: 250px; }

        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .analysis-grid { grid-template-columns: 1fr; } }
        .panel { background: #1e222d; padding: 25px; border-radius: 8px; line-height: 1.8; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 500px; overflow-y: auto; }

        .signal-buy    { color: #26a69a; font-weight: bold; }
        .signal-sell   { color: #ef5350; font-weight: bold; }
        .signal-neutral{ color: #ffb74d; font-weight: bold; }
        h2, h3 { margin-top: 0; color: #fff; }

        #ai-content { font-size: 0.95em; color: #ccc; padding-right: 10px; }
        #ai-content h1, #ai-content h2, #ai-content h3 { color: #e1bee7; margin-top: 15px; margin-bottom: 5px; font-size: 1.1em; }
        #ai-content p { margin-top: 0; }
        .api-link { color: #2962ff; text-decoration: none; }
        .api-link:hover { text-decoration: underline; }

        ::-webkit-scrollbar       { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e222d; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        /* ── 共識目標價面板 ── */
        .consensus-panel { background: #1e222d; padding: 25px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .consensus-grid  { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 16px; }
        .stat-card { background: #252836; border-radius: 8px; padding: 14px; text-align: center; border: 1px solid #2e3347; }
        .stat-card .s-label { font-size: 0.72em; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
        .stat-card .s-value { font-size: 1.45em; font-weight: bold; color: #fff; }
        .stat-card .s-sub   { font-size: 0.78em; color: #777; margin-top: 3px; }
        .rec-badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-weight: bold; font-size: 0.92em; }
        .target-bar-track { background: #2b2b43; border-radius: 4px; height: 8px; position: relative; margin: 6px 0 4px; }
        .target-bar-fill  { height: 100%; border-radius: 4px; background: linear-gradient(to right, #ef5350 0%, #ffb74d 50%, #26a69a 100%); }
        .target-bar-pin   { position: absolute; top: -5px; width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 3px solid #2962ff; transform: translateX(-50%); box-shadow: 0 0 6px rgba(41,98,255,0.6); }
        .dist-bars { display: flex; gap: 6px; align-items: flex-end; height: 64px; margin-top: 8px; }
        .dist-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .dist-bar-col .d-count { font-size: 0.75em; color: #ccc; }
        .dist-bar-col .d-bar   { width: 100%; border-radius: 3px 3px 0 0; min-height: 4px; }
        .dist-bar-col .d-label { font-size: 0.62em; color: #888; text-align: center; line-height: 1.3; }

        /* ── 釘選列 ── */
        .pin-bar { background: #1a1e2e; border-radius: 8px; padding: 10px 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border: 1px solid #2e3347; }
        .pin-bar-label { font-size: 0.82em; color: #666; white-space: nowrap; }
        .pin-chips { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
        .pin-chip { display: inline-flex; align-items: center; gap: 6px; background: #252836; border: 1px solid #3a3f55; border-radius: 20px; padding: 4px 12px 4px 14px; font-size: 0.82em; transition: border-color 0.2s; }
        .pin-chip:hover { border-color: #2962ff; }
        .pin-load { font-weight: bold; color: #e0e0e0; cursor: pointer; }
        .pin-remove { color: #444; cursor: pointer; font-size: 1em; line-height: 1; margin-left: 2px; }
        .pin-remove:hover { color: #ef5350; }
        .btn-pin { background: #37474f; color: white; padding: 10px 14px; font-size: 14px; }
        .btn-pin:hover:not(:disabled) { background: #455a64; }
        .btn-pin.active { background: #2962ff; }
        .btn-compare { background: #e65100; color: white; padding: 6px 14px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.82em; font-weight: bold; white-space: nowrap; transition: background 0.2s; }
        .btn-compare:hover:not(:disabled) { background: #bf360c; }
        .btn-compare:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── 入場評分 ── */
        .score-wrap { display: flex; align-items: center; gap: 18px; background: #252836; border-radius: 8px; padding: 14px 16px; margin-bottom: 14px; border: 1px solid #2e3347; }
        .score-ring { text-align: center; min-width: 72px; }
        .score-num  { font-size: 2.6em; font-weight: 900; line-height: 1; }
        .score-deno { font-size: 0.78em; color: #555; margin-top: 2px; }
        .score-info { flex: 1; }
        .score-grade { font-size: 0.95em; font-weight: bold; margin-bottom: 7px; }
        .score-track { background: #1a1e2e; border-radius: 4px; height: 6px; margin-bottom: 10px; overflow: hidden; }
        .score-fill  { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .score-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 16px; }
        .score-row   { font-size: 0.7em; display: flex; justify-content: space-between; color: #666; }
        .score-row span:last-child { color: #bbb; font-weight: bold; }

        /* ── 比較面板 ── */
        .compare-panel { background: #1e222d; padding: 25px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .cmp-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.86em; }
        .cmp-table th { text-align: left; padding: 8px 12px; color: #666; font-weight: 500; border-bottom: 1px solid #2e3347; font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.04em; }
        .cmp-table td { padding: 10px 12px; border-bottom: 1px solid #222; cursor: pointer; }
        .cmp-table tr:hover td { background: #252836; }
        .cmp-rank { color: #555; font-size: 0.85em; width: 28px; }

        .score-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-weight: bold; font-size: 0.9em; }

<body>
<div class="container">
    <div class="header-panel">

            <div class="search-bar">

                       oninput="this.value = this.value.toUpperCase()">

        <div id="main-chart"></div>
        <div id="macd-chart"></div>
    </div>

    <div class="analysis-grid">
        <div class="panel">
            <h3>📊 演算法技術分析</h3>
            <!-- 入場評分 -->

                    <div id="score-grid" class="score-grid"></div>
                </div>
            </div>

                <button class="btn-ai" id="ai-btn" onclick="generateAIAnalysis()">一鍵生成</button>
            </div>
            <div id="ai-content">請先輸入 API Key 並儲存，接著點擊「一鍵生成」，AI 將為你分析該公司基本面與風險。</div>
        </div>
    </div>

    <!-- 比較面板 -->

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
            <h3 style="margin:0">⚡ 釘選股入場評分比較</h3>
            <button onclick="document.getElementById('compare-panel').style.display='none'" style="background:none;color:#555;font-size:1.3em;padding:4px 8px;line-height:1">✕</button>
        </div>
        <div id="compare-content"></div>
    </div>

    <div class="consensus-panel" id="consensus-panel">
        <h3 style="margin:0; color:#aaa;">🎯 華爾街機構共識目標價</h3>
        <p style="color:#555; margin:8px 0 0; font-size:0.9em;">搜尋股票後自動載入分析師資料...</p>

<script>
// ── 常數 ───────────────────────────────────────────────────────────────────
const CORS_PROXIES = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://thingproxy.freeboard.io/fetch/${url}`,
];
const BB_PERIOD   = 20;
const RSI_PERIOD  = 14;
const MACD_FAST   = 12;
const MACD_SLOW   = 26;
const MACD_SIGNAL = 9;

// ── API Key ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    const gk = localStorage.getItem('geminiApiKey');
    const ak = localStorage.getItem('avApiKey');
    if (gk) document.getElementById('gemini-key').value = gk;
    if (ak) document.getElementById('av-key').value = ak;
    renderPins();
    // 讓瀏覽器先完成圖表容器的 layout，再呼叫 analyzeStock
    setTimeout(analyzeStock, 0);
});

function saveGeminiKey() {
    const k = document.getElementById('gemini-key').value.trim();
    k ? localStorage.setItem('geminiApiKey', k) : localStorage.removeItem('geminiApiKey');
    alert(k ? 'Gemini Key 已儲存！' : 'Gemini Key 已清除！');
}
function saveAvKey() {
    const k = document.getElementById('av-key').value.trim();
    k ? localStorage.setItem('avApiKey', k) : localStorage.removeItem('avApiKey');
    alert(k ? 'Alpha Vantage Key 已儲存！' : 'Alpha Vantage Key 已清除！');
}

// ── 圖表初始化 ─────────────────────────────────────────────────────────────
const baseLayout = {
    layout:     { backgroundColor: '#1e222d', textColor: '#d1d4dc' },
    grid:       { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
    crosshair:  { mode: LightweightCharts.CrosshairMode.Normal },
    timeScale:  { borderColor: '#2b2b43', timeVisible: true },
};

const mainChart = LightweightCharts.createChart(
    document.getElementById('main-chart'),
    { ...baseLayout, rightPriceScale: { borderColor: '#2b2b43' } }
);
const candleSeries = mainChart.addCandlestickSeries({
    upColor: '#26a69a', downColor: '#ef5350',
    borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350',
});
const volumeSeries = mainChart.addHistogramSeries({
    color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: 'vol',
});
mainChart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

const bbUpperSeries  = mainChart.addLineSeries({ color: 'rgba(41,98,255,0.5)',  lineWidth: 1, title: 'BB Upper' });
const bbMiddleSeries = mainChart.addLineSeries({ color: 'rgba(255,152,0,0.8)',  lineWidth: 2, title: 'SMA 20'   });
const bbLowerSeries  = mainChart.addLineSeries({ color: 'rgba(41,98,255,0.5)',  lineWidth: 1, title: 'BB Lower' });

const macdChart = LightweightCharts.createChart(
    document.getElementById('macd-chart'),
    { ...baseLayout,
      rightPriceScale: { visible: true, borderColor: '#2b2b43' },
      leftPriceScale:  { visible: true, borderColor: '#2b2b43' } }
);
const macdHistSeries   = macdChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'right' });
const macdLineSeries   = macdChart.addLineSeries({ color: '#2962FF', lineWidth: 2, title: 'MACD',       priceScaleId: 'right' });
const macdSignalSeries = macdChart.addLineSeries({ color: '#FF6D00', lineWidth: 2, title: 'Signal',     priceScaleId: 'right' });
const rsiSeries        = macdChart.addLineSeries({ color: '#E1BEE7', lineWidth: 1.5, title: 'RSI (14)', priceScaleId: 'left'  });

rsiSeries.createPriceLine({ price: 70, color: '#ef5350', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: '超買' });
rsiSeries.createPriceLine({ price: 30, color: '#26a69a', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: '超賣' });

// 防止雙向同步產生無限迴圈；r.from/r.to 在資料尚未就緒時可能為 null
let syncing = false;
mainChart.timeScale().subscribeVisibleTimeRangeChange(r => {
    if (syncing || !r?.from || !r?.to) return;
    syncing = true;
    try { macdChart.timeScale().setVisibleRange(r); } catch { /* macd 資料尚未就緒 */ }
    syncing = false;
});
macdChart.timeScale().subscribeVisibleTimeRangeChange(r => {
    if (syncing || !r?.from || !r?.to) return;
    syncing = true;
    try { mainChart.timeScale().setVisibleRange(r); } catch { /* main 資料尚未就緒 */ }
    syncing = false;
});

// ── 資料清洗 ────────────────────────────────────────────────────────────────
function safeLineData(arr) {
    return arr
        .filter(d => d?.time && Number.isFinite(d.value))
        .sort((a, b) => a.time < b.time ? -1 : 1);
}
function safeCandleData(arr) {
    return arr
        .filter(d => d?.time && [d.open, d.high, d.low, d.close].every(Number.isFinite))
        .sort((a, b) => a.time < b.time ? -1 : 1);
}

// ── 抓取資料 ────────────────────────────────────────────────────────────────
async function fetchRealData(symbol) {
    const target = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?range=3y&interval=1d`;
    let raw = null;
    for (const makeUrl of CORS_PROXIES) {
        try {
            const res = await fetch(makeUrl(target));
            if (res.ok) { raw = await res.json(); break; }
        } catch { /* try next */ }
    }
    if (!raw?.chart?.result) throw new Error('代理伺服器目前皆忙線中，請稍後再試。');

    const { timestamp = [], indicators: { quote: [q = {}] } } = raw.chart.result[0];
    const seen = new Set();
    const data = [];
    for (let i = 0; i < timestamp.length; i++) {
        if (q.open[i] == null || q.close[i] == null || q.high[i] == null || q.low[i] == null) continue;
        const time = new Date(timestamp[i] * 1000).toISOString().slice(0, 10);
        if (seen.has(time)) continue;
        seen.add(time);
        data.push({
            time,
            open:   +q.open[i].toFixed(2),
            high:   +q.high[i].toFixed(2),
            low:    +q.low[i].toFixed(2),
            close:  +q.close[i].toFixed(2),
            volume: q.volume[i] || 0,
        });
    }
    return safeCandleData(data);
}

// ── 指標計算（皆為 O(n)） ───────────────────────────────────────────────────
function calcSMA(data, period) {
    const result = [];
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
        sum += data[i].close;
        if (i >= period) sum -= data[i - period].close;
        if (i >= period - 1) result.push({ time: data[i].time, value: sum / period });
    }
    return result;
}

// sma 與 data 對齊：sma[j] 對應 data[j + period - 1]
function calcBBands(data, sma, period) {
    const upper = [], lower = [];
    sma.forEach((s, j) => {
        const base = j + period - 1;
        let sumSq = 0;
        for (let k = 0; k < period; k++) sumSq += (data[base - k].close - s.value) ** 2;
        const std = Math.sqrt(sumSq / period);
        upper.push({ time: s.time, value: s.value + std * 2 });
        lower.push({ time: s.time, value: s.value - std * 2 });
    });
    return { upper, lower };
}

function calcEMA(data, period, closeKey = 'close') {
    const result = [];
    if (data.length < period) return result;
    const k = 2 / (period + 1);
    let ema = data.slice(0, period).reduce((s, d) => s + d[closeKey], 0) / period;
    result.push({ time: data[period - 1].time, value: ema });
    for (let i = period; i < data.length; i++) {
        ema = data[i][closeKey] * k + ema * (1 - k);
        result.push({ time: data[i].time, value: ema });
    }
    return result;
}

function calcRSI(data, period) {
    const result = [];
    if (data.length <= period) return result;
    let avgGain = 0, avgLoss = 0;
    for (let i = 1; i <= period; i++) {
        const d = data[i].close - data[i - 1].close;
        if (d > 0) avgGain += d; else avgLoss -= d;
    }
    avgGain /= period; avgLoss /= period;
    const rsi = v => v === 0 ? 100 : 100 - 100 / (1 + v);
    result.push({ time: data[period].time, value: rsi(avgLoss === 0 ? Infinity : avgGain / avgLoss) });
    for (let i = period + 1; i < data.length; i++) {
        const d = data[i].close - data[i - 1].close;
        avgGain = (avgGain * (period - 1) + Math.max(d, 0)) / period;
        avgLoss = (avgLoss * (period - 1) + Math.max(-d, 0)) / period;
        result.push({ time: data[i].time, value: rsi(avgLoss === 0 ? Infinity : avgGain / avgLoss) });
    }
    return result;
}

function calcMACD(data) {
    const ema12 = calcEMA(data, MACD_FAST);
    const ema26 = calcEMA(data, MACD_SLOW);
    const map12 = new Map(ema12.map(e => [e.time, e.value]));
    // macdRaw: use 'close' key = MACD value (so calcEMA re-uses closeKey param)
    const macdRaw = ema26
        .filter(e => map12.has(e.time))
        .map(e => ({ time: e.time, close: map12.get(e.time) - e.value }));

    const signal = calcEMA(macdRaw, MACD_SIGNAL, 'close');
    const sigMap = new Map(signal.map(s => [s.time, s.value]));

    const lineData = [], sigData = [], histData = [];
    let prevHist = 0;
    signal.forEach(s => {
        const m = macdRaw.find(r => r.time === s.time);
        if (!m) return;
        const hist = m.close - s.value;
        const color = hist >= 0
            ? (hist >= prevHist ? '#26a69a' : '#80cbc4')
            : (hist <= prevHist ? '#ef5350'  : '#ef9a9a');
        lineData.push({ time: s.time, value: m.close });
        sigData.push({ time: s.time, value: s.value });
        histData.push({ time: s.time, value: hist, color });
        prevHist = hist;
    });
    return { lineData, sigData, histData };
}

// ── 分析師共識目標價 ────────────────────────────────────────────────────────
const REC_MAP = {
    strong_buy:   { label: '強力買進', color: '#26a69a' },
    buy:          { label: '買進',     color: '#4caf50' },
    hold:         { label: '持有',     color: '#ffb74d' },
    underperform: { label: '表現落後', color: '#ff7043' },
    sell:         { label: '賣出',     color: '#ef5350' },
};

async function fetchAnalystData(symbol) {
    const key = localStorage.getItem('avApiKey');
    if (!key) return null;

    // Alpha Vantage 原生支援 CORS，不需代理
    try {
        const res = await fetch(
            `https://www.alphavantage.co/query?function=OVERVIEW&symbol=${symbol}&apikey=${key}`
        );
        if (!res.ok) return null;
        const d = await res.json();

        const mean = parseFloat(d.AnalystTargetPrice);
        if (!mean || isNaN(mean)) return null;

        const strongBuy  = parseInt(d.AnalystRatingStrongBuy)  || 0;
        const buy        = parseInt(d.AnalystRatingBuy)        || 0;
        const hold       = parseInt(d.AnalystRatingHold)       || 0;
        const sell       = parseInt(d.AnalystRatingSell)       || 0;
        const strongSell = parseInt(d.AnalystRatingStrongSell) || 0;
        const total      = strongBuy + buy + hold + sell + strongSell;

        const score = total > 0
            ? (strongBuy*1 + buy*2 + hold*3 + sell*4 + strongSell*5) / total
            : null;
        const recKey = score == null ? null
            : score <= 1.5 ? 'strong_buy'
            : score <= 2.5 ? 'buy'
            : score <= 3.5 ? 'hold'
            : score <= 4.5 ? 'underperform'
            : 'sell';

        return {
            mean,
            high:       parseFloat(d['52WeekHigh'])  || null,
            low:        parseFloat(d['52WeekLow'])   || null,
            analysts:   total || null,
            recMean:    score,
            recKey,
            highIsTarget: false,   // 標記 high/low 來源為 52 週而非分析師目標
            strongBuy, buy, hold, sell, strongSell,
        };
    } catch { return null; }
}

// ── 入場評分 ───────────────────────────────────────────────────────────────
function calculateEntryScore(close, rsi, sma20, upper, lower, histData) {
    // RSI (30 pts)：30-50 最佳入場區
    const rsiScore =
        rsi < 20 ? 8 : rsi < 30 ? 18 : rsi < 50 ? 30 :
        rsi < 60 ? 22 : rsi < 70 ? 12 : 4;

    // 布林位置 (25 pts)：價格在下軌到中軌之間得分最高
    const bbScore =
        close < lower  ? 20 : close < sma20 ? 25 :
        close < upper  ? 15 : 5;

    // MACD 柱狀 (25 pts)
    let macdScore = 10;
    if (histData.length >= 2) {
        const h0 = histData.at(-1).value, h1 = histData.at(-2).value;
        macdScore = h0 > 0 && h0 > h1  ? 25
                  : h0 > 0             ? 15
                  : h0 < 0 && h0 >= h1 ? 12
                  : 3;
    }

    // 趨勢 (20 pts)
    const macdPos = histData.length > 0 && histData.at(-1).value > 0;
    const trendScore =
        close > sma20 && macdPos ? 20 :
        close > sma20            ? 13 :
        close > lower            ? 7  : 3;

    const total = Math.min(100, rsiScore + bbScore + macdScore + trendScore);
    const grade =
        total >= 72 ? { label: '強烈建議入場', color: '#26a69a', icon: '🟢' } :
        total >= 55 ? { label: '可考慮入場',   color: '#4caf50', icon: '🟡' } :
        total >= 38 ? { label: '保持觀望',     color: '#ffb74d', icon: '🟠' } :
                      { label: '不建議入場',   color: '#ef5350', icon: '🔴' };

    return { total, rsiScore, bbScore, macdScore, trendScore, grade };
}

function renderScore(s) {
    const wrap  = document.getElementById('score-wrap');
    const { total, rsiScore, bbScore, macdScore, trendScore, grade } = s;
    document.getElementById('score-num').textContent = total;
    document.getElementById('score-num').style.color = grade.color;
    document.getElementById('score-grade').innerHTML = `${grade.icon} <strong>${grade.label}</strong>`;
    document.getElementById('score-grade').style.color = grade.color;
    const fill = document.getElementById('score-fill');
    fill.style.width = `${total}%`;
    fill.style.background = grade.color;
    document.getElementById('score-grid').innerHTML = `

        <div class="score-row"><span>MACD 力道</span><span>${macdScore}/25</span></div>
        <div class="score-row"><span>布林位置</span><span>${bbScore}/25</span></div>
        <div class="score-row"><span>趨勢方向</span><span>${trendScore}/20</span></div>`;
    wrap.style.display = 'flex';
}

// ── 一鍵比較 ───────────────────────────────────────────────────────────────
async function quickScore(symbol) {
    try {
        const data = await fetchRealData(symbol);
        if (data.length < 30) return null;
        const sma20 = calcSMA(data, BB_PERIOD);
        const { upper, lower } = calcBBands(data, sma20, BB_PERIOD);
        const rsiData  = calcRSI(data, RSI_PERIOD);
        const { histData } = calcMACD(data);
        const last    = data.at(-1);
        const curRSI  = rsiData.at(-1)?.value  ?? 50;
        const curSMA  = sma20.at(-1)?.value    ?? last.close;
        const curUp   = upper.at(-1)?.value    ?? last.close;
        const curLow  = lower.at(-1)?.value    ?? last.close;
        const score   = calculateEntryScore(last.close, curRSI, curSMA, curUp, curLow, histData);

        const h0 = histData.at(-1)?.value ?? 0;
        const h1 = histData.at(-2)?.value ?? 0;
        score.bbLabel   = last.close < curLow  ? '跌破下軌' : last.close < curSMA ? '下軌↔中軌' :
                          last.close < curUp   ? '中軌↔上軌' : '突破上軌';
        score.macdLabel = h0 > 0 && h0 > h1 ? '紅柱伸長' : h0 > 0 ? '紅柱縮短' :
                          h0 < 0 && h0 >= h1 ? '綠柱縮短' : '綠柱伸長';
        return { symbol, close: last.close, rsi: curRSI, score };
    } catch { return null; }
}

// ── 主程式 ──────────────────────────────────────────────────────────────────
async function analyzeStock() {
    const symbol = document.getElementById('symbol').value.toUpperCase().trim();
    if (!symbol) return;

    const btn = document.getElementById('search-btn');
    const resultsList = document.getElementById('ta-results');
    const verdict = document.getElementById('final-verdict');
    document.getElementById('ai-content').innerHTML = '點擊上方按鈕獲取 AI 分析。';

    btn.textContent = '資料解析中...'; btn.disabled = true;
    resultsList.innerHTML = '<li>連線抓取並清洗資料中...</li>';
    verdict.innerHTML = '';
    document.getElementById('consensus-panel').innerHTML =
        '<h3 style="margin:0; color:#aaa;">🎯 華爾街機構共識目標價</h3><p style="color:#555; margin:8px 0 0; font-size:0.9em;">載入分析師資料中...</p>';

    try {
        const [chartResult, analystResult] = await Promise.allSettled([
            fetchRealData(symbol),
            fetchAnalystData(symbol),
        ]);
        if (chartResult.status === 'rejected') throw chartResult.reason;
        const data        = chartResult.value;
        const analystData = analystResult.status === 'fulfilled' ? analystResult.value : null;
        if (data.length < 30) throw new Error('歷史資料量不足，請確認代號是否正確。');

        // 清空舊資料
        [candleSeries, volumeSeries, bbUpperSeries, bbMiddleSeries, bbLowerSeries,
         macdLineSeries, macdSignalSeries, macdHistSeries, rsiSeries]
            .forEach(s => s.setData([]));

        // 主圖：K線 + 成交量
        candleSeries.setData(data);
        volumeSeries.setData(safeLineData(data.map(d => ({
            time: d.time, value: d.volume,
            color: d.close >= d.open ? 'rgba(38,166,154,0.5)' : 'rgba(239,83,80,0.5)',
        }))));

        // 布林通道
        const sma20 = calcSMA(data, BB_PERIOD);
        const { upper, lower } = calcBBands(data, sma20, BB_PERIOD);
        bbMiddleSeries.setData(safeLineData(sma20));
        bbUpperSeries.setData(safeLineData(upper));
        bbLowerSeries.setData(safeLineData(lower));

        // MACD
        const { lineData, sigData, histData } = calcMACD(data);
        macdLineSeries.setData(safeLineData(lineData));
        macdSignalSeries.setData(safeLineData(sigData));
        macdHistSeries.setData(safeLineData(histData));

        // RSI
        const rsiData = calcRSI(data, RSI_PERIOD);
        rsiSeries.setData(safeLineData(rsiData));

        mainChart.timeScale().fitContent();

        // ── 文字分析 ──────────────────────────────────────────────────────
        const last      = data[data.length - 1];
        const curRSI    = rsiData.at(-1)?.value  ?? 50;
        const curSMA20  = sma20.at(-1)?.value    ?? last.close;
        const curUpper  = upper.at(-1)?.value    ?? last.close;
        const curLower  = lower.at(-1)?.value    ?? last.close;

        let score = 0;
        const items = [`<li><strong>當前收盤價：</strong> $${last.close.toFixed(2)}</li>`];

        if      (curRSI > 70) { items.push(`<li><span class="signal-sell">RSI (${curRSI.toFixed(1)}) 超買</span>：短期動能過熱。</li>`); score--; }
        else if (curRSI < 30) { items.push(`<li><span class="signal-buy">RSI (${curRSI.toFixed(1)}) 超賣</span>：短線醞釀反彈。</li>`); score++; }
        else                  { items.push(`<li><span class="signal-neutral">RSI (${curRSI.toFixed(1)}) 中性</span>：動能平穩。</li>`); }

        if      (last.close > curUpper) { items.push(`<li><span class="signal-sell">突破布林上軌</span>：股價強勢但乖離過大，注意拉回。</li>`); score--; }
        else if (last.close < curLower) { items.push(`<li><span class="signal-buy">跌破布林下軌</span>：可能出現超跌反彈。</li>`); score++; }
        else if (last.close > curSMA20) { items.push(`<li><span class="signal-buy">站上布林中軌 (20MA)</span>：多方控盤中。</li>`); score++; }
        else                            { items.push(`<li><span class="signal-sell">跌破布林中軌 (20MA)</span>：空方控盤中。</li>`); score--; }

        if (histData.length >= 2) {
            const h0 = histData.at(-1).value;
            const h1 = histData.at(-2).value;
            if      (h0 > 0 && h0 > h1) { items.push(`<li><span class="signal-buy">MACD 紅柱伸長</span>：多方動能增強。</li>`); score++; }
            else if (h0 > 0 && h0 <= h1) { items.push(`<li><span class="signal-neutral">MACD 紅柱縮短</span>：多方動能衰退。</li>`); }
            else if (h0 < 0 && h0 < h1) { items.push(`<li><span class="signal-sell">MACD 綠柱伸長</span>：空方動能增強。</li>`); score--; }
            else if (h0 < 0 && h0 >= h1) { items.push(`<li><span class="signal-neutral">MACD 綠柱縮短</span>：空方動能減弱。</li>`); score++; }
        }

        resultsList.innerHTML = items.join('');
        if      (score >= 2)  verdict.innerHTML = `🏆 技術面判定：<span class="signal-buy">強勢偏多 (Buy)</span>`;
        else if (score <= -2) verdict.innerHTML = `⚠️ 技術面判定：<span class="signal-sell">弱勢偏空 (Sell)</span>`;
        else                  verdict.innerHTML = `⚖️ 技術面判定：<span class="signal-neutral">震盪整理 (Hold)</span>`;

        // 入場評分
        const entryScore = calculateEntryScore(last.close, curRSI, curSMA20, curUpper, curLower, histData);
        renderScore(entryScore);

        renderConsensus(analystData, last.close);
        renderPins();

    } catch (e) {
        console.error('[analyzeStock]', e.message, e.stack);
        resultsList.innerHTML = `<li><span class="signal-sell">錯誤：${e.message}</span></li>`;
        document.getElementById('score-wrap').style.display = 'none';
        renderConsensus(null, 0);
    } finally {
        btn.textContent = '抓取技術線圖'; btn.disabled = false;
    }
}

document.getElementById('symbol').addEventListener('keydown', e => { if (e.key === 'Enter') analyzeStock(); });
</script>
</body>
</html>
