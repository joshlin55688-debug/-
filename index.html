<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業技術分析儀表板</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #444; flex: 1; background: #2a2a2a; color: white; }
        button { padding: 12px 24px; font-size: 16px; border-radius: 5px; border: none; background-color: #2962ff; color: white; cursor: pointer; transition: 0.3s; font-weight: bold;}
        button:hover { background-color: #1e4bd8; }
        
        .chart-container { background: #1e222d; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #main-chart { width: 100%; height: 500px; margin-bottom: 10px; }
        #macd-chart { width: 100%; height: 200px; }
        
        .analysis-panel { background: #1e222d; padding: 25px; border-radius: 8px; line-height: 1.8; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .signal-buy { color: #26a69a; font-weight: bold; }
        .signal-sell { color: #ef5350; font-weight: bold; }
        .signal-neutral { color: #ffb74d; font-weight: bold; }
        h2, h3 { margin-top: 0; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>📈 專業技術分析儀表板 (無敵裝甲版)</h2>
    <div class="search-bar">
        <input type="text" id="symbol" placeholder="輸入代號 (美股: TSLA, 台股: 2330.TW)" value="NVDA" oninput="this.value = this.value.toUpperCase()">
        <button onclick="analyzeStock()" id="search-btn">搜尋並分析</button>
    </div>
    
    <div class="chart-container">
        <div id="main-chart"></div>
        <div id="macd-chart"></div>
    </div>

    <div class="analysis-panel">
        <h3>📊 演算法綜合分析 <span id="trend-status"></span></h3>
        <ul id="ta-results">
            <li>請輸入股票代號並點擊搜尋...</li>
        </ul>
        <h4 id="final-verdict" style="font-size: 1.2em; border-top: 1px solid #444; padding-top: 15px; margin-top: 15px;"></h4>
    </div>
</div>

<script>
    // ==========================================
    // 1. 初始化圖表 
    // ==========================================
    const chartOptions = {
        layout: { backgroundColor: '#1e222d', textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: '#2b2b43' },
        timeScale: { borderColor: '#2b2b43', timeVisible: true }
    };

    const mainChart = LightweightCharts.createChart(document.getElementById('main-chart'), chartOptions);
    const candleSeries = mainChart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350' });
    const volumeSeries = mainChart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });
    mainChart.priceScale('').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

    const bbUpperSeries = mainChart.addLineSeries({ color: 'rgba(41, 98, 255, 0.5)', lineWidth: 1, title: 'BB Upper' });
    const bbMiddleSeries = mainChart.addLineSeries({ color: 'rgba(255, 152, 0, 0.8)', lineWidth: 2, title: 'SMA 20' });
    const bbLowerSeries = mainChart.addLineSeries({ color: 'rgba(41, 98, 255, 0.5)', lineWidth: 1, title: 'BB Lower' });

    const macdChart = LightweightCharts.createChart(document.getElementById('macd-chart'), chartOptions);
    const macdHistogramSeries = macdChart.addHistogramSeries({ priceFormat: { type: 'volume' }});
    const macdLineSeries = macdChart.addLineSeries({ color: '#2962FF', lineWidth: 2, title: 'MACD' });
    const macdSignalSeries = macdChart.addLineSeries({ color: '#FF6D00', lineWidth: 2, title: 'Signal' });

    mainChart.timeScale().subscribeVisibleTimeRangeChange(range => { macdChart.timeScale().setVisibleRange(range); });
    macdChart.timeScale().subscribeVisibleTimeRangeChange(range => { mainChart.timeScale().setVisibleRange(range); });

    // 過濾髒數據的神器
    function getSafeData(data) {
        return data.filter(d => d && d.time && d.value !== undefined && !isNaN(d.value))
                   .sort((a, b) => a.time.localeCompare(b.time));
    }

    // ==========================================
    // 2. 抓取資料 (多重代理伺服器)
    // ==========================================
    async function fetchRealData(symbol) {
        const targetUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?range=3y&interval=1d`;
        const proxies = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
            `https://thingproxy.freeboard.io/fetch/${targetUrl}`
        ];

        let rawData = null;
        for (let proxy of proxies) {
            try {
                const response = await fetch(proxy);
                if (response.ok) { rawData = await response.json(); break; }
            } catch (e) { console.warn("切換代理伺服器..."); }
        }

        if (!rawData || !rawData.chart.result) throw new Error("代理伺服器全數塞車，請稍後再試！");

        const result = rawData.chart.result[0];
        const timestamps = result.timestamp || [];
        const quote = result.indicators.quote[0] || {};
        
        let dataMap = new Map();
        for (let i = 0; i < timestamps.length; i++) {
            if (quote.open[i] == null || quote.close[i] == null) continue;
            const timeString = new Date(timestamps[i] * 1000).toISOString().split('T')[0];
            dataMap.set(timeString, {
                time: timeString,
                open: quote.open[i], high: quote.high[i], low: quote.low[i], close: quote.close[i],
                volume: quote.volume[i] || 0
            });
        }
        return Array.from(dataMap.values()).sort((a, b) => a.time.localeCompare(b.time));
    }

    // ==========================================
    // 3. 技術指標計算引擎
    // ==========================================
    function calculateSMA(data, period) {
        let result = [];
        for (let i = period - 1; i < data.length; i++) {
            let sum = 0;
            for (let j = 0; j < period; j++) sum += data[i - j].close;
            result.push({ time: data[i].time, value: sum / period });
        }
        return result;
    }

    function calculateStdDev(data, sma, period) {
        let result = [];
        for (let i = period - 1; i < data.length; i++) {
            let currentSma = sma.find(s => s.time === data[i].time)?.value;
            if (currentSma === undefined) continue;
            let sumSq = 0;
            for (let j = 0; j < period; j++) sumSq += Math.pow(data[i - j].close - currentSma, 2);
            result.push({ time: data[i].time, value: Math.sqrt(sumSq / period) });
        }
        return result;
    }

    function calculateEMA(data, period) {
        let result = [];
        if (data.length < period) return result;
        let k = 2 / (period + 1);
        let sum = 0;
        for(let i = 0; i < period; i++) sum += data[i].close || 0;
        let ema = sum / period; 
        result.push({ time: data[period - 1].time, value: ema });
        for (let i = period; i < data.length; i++) {
            ema = ((data[i].close || 0) * k) + (ema * (1 - k));
            result.push({ time: data[i].time, value: ema });
        }
        return result;
    }

    function calculateRSI(data, period) {
        if (data.length <= period) return 50; 
        let closes = data.map(d => d.close);
        let gains = 0, losses = 0;
        for (let i = 1; i <= period; i++) {
            let change = closes[i] - closes[i - 1];
            if (change > 0) gains += change; else losses -= change;
        }
        let avgGain = gains / period, avgLoss = losses / period;
        for (let i = period + 1; i < closes.length; i++) {
            let change = closes[i] - closes[i - 1];
            avgGain = ((avgGain * (period - 1)) + Math.max(change, 0)) / period;
            avgLoss = ((avgLoss * (period - 1)) + Math.abs(Math.min(change, 0))) / period;
        }
        return avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));
    }

    // ==========================================
    // 4. 主程式
    // ==========================================
    async function analyzeStock() {
        const symbol = document.getElementById('symbol').value.toUpperCase().trim();
        if (!symbol) return;

        const btn = document.getElementById('search-btn');
        const resultsContainer = document.getElementById('ta-results');
        const verdictContainer = document.getElementById('final-verdict');
        
        btn.innerText = "資料解析中..."; btn.disabled = true;
        resultsContainer.innerHTML = "<li>連線抓取並清洗資料中...</li>";
        verdictContainer.innerHTML = "";

        try {
            const historicalData = await fetchRealData(symbol);
            if (historicalData.length < 30) throw new Error("資料量不足無法分析。");

            // 繪製主圖與成交量
            candleSeries.setData(historicalData);
            volumeSeries.setData(getSafeData(historicalData.map(d => ({
                time: d.time, value: d.volume, color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)'
            }))));

            // 繪製布林通道
            const sma20Data = calculateSMA(historicalData, 20);
            const stdDevData = calculateStdDev(historicalData, sma20Data, 20);
            let upperData = [], lowerData = [];
            
            sma20Data.forEach(sma => {
                let std = stdDevData.find(s => s.time === sma.time)?.value || 0;
                upperData.push({ time: sma.time, value: sma.value + (std * 2) });
                lowerData.push({ time: sma.time, value: sma.value - (std * 2) });
            });

            bbMiddleSeries.setData(getSafeData(sma20Data));
            bbUpperSeries.setData(getSafeData(upperData));
            bbLowerSeries.setData(getSafeData(lowerData));

            // 繪製 MACD
            const ema12 = calculateEMA(historicalData, 12);
            const ema26 = calculateEMA(historicalData, 26);
            let macdLine = [];
            
            ema26.forEach(e26 => {
                let e12 = ema12.find(e => e.time === e26.time);
                if(e12) macdLine.push({ time: e26.time, close: e12.value - e26.value });
            });

            const signalLineRaw = calculateEMA(macdLine, 9);
            let macdLineDisplay = [], signalLineDisplay = [], histogramDisplay = [];

            signalLineRaw.forEach((sig, index) => {
                let m = macdLine.find(m => m.time === sig.time);
                if(m) {
                    let histVal = m.close - sig.value;
                    let prevHist = index > 0 ? (macdLineDisplay[index-1].value - signalLineRaw[index-1].value) : 0;
                    let color = histVal >= 0 ? (histVal > prevHist ? '#26a69a' : '#80cbc4') : (histVal < prevHist ? '#ef5350' : '#ef9a9a');
                    
                    macdLineDisplay.push({ time: sig.time, value: m.close });
                    signalLineDisplay.push({ time: sig.time, value: sig.value });
                    histogramDisplay.push({ time: sig.time, value: histVal, color: color });
                }
            });

            macdLineSeries.setData(getSafeData(macdLineDisplay));
            macdSignalSeries.setData(getSafeData(signalLineDisplay));
            macdHistogramSeries.setData(getSafeData(histogramDisplay));

            mainChart.timeScale().fitContent();

            // 執行文字分析
            const currentClose = historicalData[historicalData.length - 1].close;
            const currentRSI = calculateRSI(historicalData, 14);
            const currentSMA20 = sma20Data.length > 0 ? sma20Data[sma20Data.length - 1].value : currentClose;
            const currentUpper = upperData.length > 0 ? upperData[upperData.length - 1].value : currentClose;
            const currentLower = lowerData.length > 0 ? lowerData[lowerData.length - 1].value : currentClose;
            
            let score = 0;
            let resultsHTML = `<li><strong>當前收盤價：</strong> $${currentClose.toFixed(2)}</li>`;

            if(currentRSI > 70) { resultsHTML += `<li><span class="signal-sell">RSI (${currentRSI.toFixed(2)}) 超買</span>：短期動能過熱。</li>`; score -= 1; }
            else if(currentRSI < 30) { resultsHTML += `<li><span class="signal-buy">RSI (${currentRSI.toFixed(2)}) 超賣</span>：短線醞釀反彈。</li>`; score += 1; }
            else { resultsHTML += `<li><span class="signal-neutral">RSI (${currentRSI.toFixed(2)}) 中性</span>：動能平穩。</li>`; }

            if(currentClose > currentUpper) { resultsHTML += `<li><span class="signal-sell">突破布林上軌</span>：股價強勢但乖離過大，注意拉回。</li>`; score -= 1; }
            else if(currentClose < currentLower) { resultsHTML += `<li><span class="signal-buy">跌破布林下軌</span>：股價弱勢但可能出現超跌反彈。</li>`; score += 1; }
            else if(currentClose > currentSMA20) { resultsHTML += `<li><span class="signal-buy">站上布林中軌 (20MA)</span>：多方控盤中。</li>`; score += 1; }
            else { resultsHTML += `<li><span class="signal-sell">跌破布林中軌 (20MA)</span>：空方控盤中。</li>`; score -= 1; }

            if (histogramDisplay.length > 1) {
                const lastHist = histogramDisplay[histogramDisplay.length - 1].value;
                const prevHist = histogramDisplay[histogramDisplay.length - 2].value;
                if(lastHist > 0 && lastHist > prevHist) { resultsHTML += `<li><span class="signal-buy">MACD 紅柱伸長</span>：多方動能增強。</li>`; score += 1; }
                else if(lastHist > 0 && lastHist <= prevHist) { resultsHTML += `<li><span class="signal-neutral">MACD 紅柱縮短</span>：多方動能衰退。</li>`; }
                else if(lastHist < 0 && lastHist < prevHist) { resultsHTML += `<li><span class="signal-sell">MACD 綠柱伸長</span>：空方動能增強。</li>`; score -= 1; }
                else if(lastHist < 0 && lastHist >= prevHist) { resultsHTML += `<li><span class="signal-neutral">MACD 綠柱縮短</span>：空方動能減弱。</li>`; score += 1; }
            }

            resultsContainer.innerHTML = resultsHTML;
            if(score >= 2) { verdictContainer.innerHTML = `🏆 綜合判定：<span class="signal-buy">強勢偏多 (Buy)</span>`; }
            else if (score <= -2) { verdictContainer.innerHTML = `⚠️ 綜合判定：<span class="signal-sell">弱勢偏空 (Sell)</span>`; }
            else { verdictContainer.innerHTML = `⚖️ 綜合判定：<span class="signal-neutral">震盪整理 (Hold)</span>`; }

        } catch (error) {
            resultsContainer.innerHTML = `<li><span class="signal-sell">錯誤：${error.message}</span></li>`;
        }

        btn.innerText = "搜尋並分析"; btn.disabled = false;
    }
    
    window.onload = () => analyzeStock();
    document.getElementById('symbol').addEventListener('keypress', e => { if (e.key === 'Enter') analyzeStock(); });
</script>
</body>
</html>
